name: CI/CD - API de scoring

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements-dev.txt

      - name: Lancer les tests de l'API
        run: pytest tests/ -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Exemple de déploiement continu vers Render (ou tout service exposant un webhook
      # de déploiement : Railway, Fly.io...). Créer un Web Service pointé sur ce repo,
      # récupérer son "Deploy Hook" et l'enregistrer comme secret de repo
      # RENDER_DEPLOY_HOOK_URL (Settings > Secrets and variables > Actions).
      - name: Déclencher le déploiement
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Secret de déploiement absent
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "RENDER_DEPLOY_HOOK_URL non configuré — étape de déploiement ignorée."
