name: CI/CD - API de scoring

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements-dev.txt

      - name: Lancer les tests de l'API
        # "python -m pytest" (et non "pytest") ajoute la racine du repo à sys.path,
        # nécessaire pour que "from api.main import app" soit importable.
        run: python -m pytest tests/ -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Le service Render est connecté directement à ce repo GitHub : il redéploie déjà
      # automatiquement à chaque push sur main via sa propre intégration native, sans
      # attendre ce job. L'appel au Deploy Hook ci-dessous n'est donc qu'un déclencheur
      # explicite "best-effort" en complément — s'il échoue (l'endpoint Render a parfois
      # renvoyé des 500 ponctuels), ça ne doit pas faire échouer le workflow, puisque le
      # déploiement réel ne dépend pas de lui.
      - name: Déclencher le déploiement (best-effort)
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        continue-on-error: true
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -sS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Secret de déploiement absent
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "RENDER_DEPLOY_HOOK_URL non configuré — étape de déploiement ignorée."
